name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend (lint, build, E2E)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npx eslint

      - name: Build
        run: npx next build

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Write .env.local
        env:
          KIBANA_URL: ${{ secrets.KIBANA_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cat <<EOF > .env.local
          KIBANA_URL=${KIBANA_URL}
          API_KEY=${API_KEY}
          EOF

      - name: Playwright E2E
        run: npx playwright test --workers=1 --grep-invert "slow"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt pytest

      - name: Write .env
        env:
          ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
          KIBANA_URL: ${{ secrets.KIBANA_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cat <<EOF > .env
          ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
          KIBANA_URL=${KIBANA_URL}
          API_KEY=${API_KEY}
          EOF

      - name: Run tests
        run: python -m pytest tests/ -v -m "not slow"
